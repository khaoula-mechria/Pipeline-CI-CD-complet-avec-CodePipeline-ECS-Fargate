AWSTemplateFormatVersion: '2010-09-09'

Description: >
  Infrastructure réseau (VPC) pour le projet PFE CI/CD AWS.
  Fournit la fondation sur laquelle s'appuieront les futures stacks :
  ECS Fargate (dans les subnets privés), ALB (dans les subnets publics),
  et CodeBuild/CodePipeline (VPC endpoints pour rester hors internet public).

  Architecture : 1 VPC / 2 AZ / 2 subnets publics / 2 subnets privés /
  1 Internet Gateway / NAT Gateway(s) configurables (single ou HA) /
  1 VPC Endpoint Gateway S3 (gratuit, réduit le trafic sortant via NAT).

# ==============================================================================
# PARAMÈTRES
# ==============================================================================
Parameters:

  ProjectName:
    Type: String
    Default: taskmanager
    AllowedPattern: '^[a-z][a-z0-9-]*$'
    Description: Doit correspondre au ProjectName utilisé dans ecr.yaml / codebuild.yaml.

  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Doit correspondre à l'Environment utilisé dans les autres stacks.

  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
    AllowedPattern: '^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$'
    Description: Bloc CIDR du VPC. /16 laisse largement la place pour des subnets futurs.

  PublicSubnet1Cidr:
    Type: String
    Default: 10.0.0.0/24
    Description: Subnet public — AZ 1 (ALB, NAT Gateway).

  PublicSubnet2Cidr:
    Type: String
    Default: 10.0.1.0/24
    Description: Subnet public — AZ 2 (ALB, NAT Gateway si stratégie HA).

  PrivateSubnet1Cidr:
    Type: String
    Default: 10.0.10.0/24
    Description: Subnet privé — AZ 1 (tâches ECS Fargate).

  PrivateSubnet2Cidr:
    Type: String
    Default: 10.0.11.0/24
    Description: Subnet privé — AZ 2 (tâches ECS Fargate).

  NatGatewayStrategy:
    Type: String
    Default: single
    AllowedValues: [single, ha]
    Description: >
      "single"  = 1 seul NAT Gateway partagé par les 2 AZ (coût réduit,
                  adapté à dev/staging — ~32 USD/mois au lieu de ~64).
      "ha"      = 1 NAT Gateway PAR AZ (haute disponibilité recommandée
                  en production : une panne d'AZ n'affecte pas la sortie
                  internet de l'autre AZ).
      Basculer de "single" à "ha" ne casse rien : seule la route de
      PrivateRouteTable2 change de cible (voir PrivateRoute2 plus bas).

  EnableFlowLogs:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Active les VPC Flow Logs vers CloudWatch Logs (traçabilité du trafic
      réseau, utile en prod / audit sécurité). Laissé à "false" par défaut
      pour ne pas générer de coût CloudWatch inutile en dev.

  FlowLogsRetentionDays:
    Type: Number
    Default: 30
    Description: Durée de rétention des Flow Logs si EnableFlowLogs=true.

# ==============================================================================
# CONDITIONS
# ==============================================================================
Conditions:
  UseHaNat: !Equals [!Ref NatGatewayStrategy, 'ha']
  CreateFlowLogs: !Equals [!Ref EnableFlowLogs, 'true']

# ==============================================================================
# RESSOURCES
# ==============================================================================
Resources:

  # ------------------------------------------------------------------------
  # VPC
  # ------------------------------------------------------------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      # Requis pour : résolution DNS privée des futurs VPC Interface Endpoints
      # (ECR, Secrets Manager, CloudWatch Logs) et pour ECS Service Discovery.
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-vpc'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # ------------------------------------------------------------------------
  # INTERNET GATEWAY (sortie/entrée internet pour les subnets publics)
  # ------------------------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-igw'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # ------------------------------------------------------------------------
  # SUBNETS PUBLICS (ALB, NAT Gateway) — 2 AZ pour la haute disponibilité
  # ------------------------------------------------------------------------
  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-public-1'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Tier
          Value: public

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PublicSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-public-2'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Tier
          Value: public

  # ------------------------------------------------------------------------
  # SUBNETS PRIVÉS (tâches ECS Fargate) — pas d'IP publique, sortie via NAT
  # ------------------------------------------------------------------------
  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet1Cidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-private-1'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Tier
          Value: private

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: !Ref PrivateSubnet2Cidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-private-2'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: Tier
          Value: private

  # ------------------------------------------------------------------------
  # ROUTAGE PUBLIC — une seule table, partagée par les 2 subnets publics
  # (les subnets publics ont tous la même règle : 0.0.0.0/0 -> IGW)
  # ------------------------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-public-rt'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ------------------------------------------------------------------------
  # NAT GATEWAY(S)
  # NatGateway1 est TOUJOURS créé (dans PublicSubnet1).
  # NatGateway2 n'est créé QUE si NatGatewayStrategy=ha (dans PublicSubnet2).
  # ------------------------------------------------------------------------
  NatGateway1Eip:
    Type: AWS::EC2::EIP
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-nat-eip-1'

  NatGateway1:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGateway1Eip.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-nat-1'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  NatGateway2Eip:
    Type: AWS::EC2::EIP
    Condition: UseHaNat
    DependsOn: VpcGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-nat-eip-2'

  NatGateway2:
    Type: AWS::EC2::NatGateway
    Condition: UseHaNat
    Properties:
      AllocationId: !GetAtt NatGateway2Eip.AllocationId
      SubnetId: !Ref PublicSubnet2
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-nat-2'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  # ------------------------------------------------------------------------
  # ROUTAGE PRIVÉ — une table PAR AZ (nécessaire même en stratégie "single",
  # car c'est ce qui permet de basculer vers "ha" plus tard sans tout
  # redéployer : seule la route change de cible, la table existe déjà).
  # ------------------------------------------------------------------------
  PrivateRouteTable1:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-private-rt-1'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  PrivateRoute1:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable1
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway1

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable1

  PrivateRouteTable2:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-${Environment}-private-rt-2'
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment

  PrivateRoute2:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable2
      DestinationCidrBlock: 0.0.0.0/0
      # Stratégie "ha"     -> route vers son propre NAT Gateway (AZ2)
      # Stratégie "single" -> route vers le NAT Gateway unique (AZ1)
      NatGatewayId: !If [UseHaNat, !Ref NatGateway2, !Ref NatGateway1]

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable2

  # ------------------------------------------------------------------------
  # VPC ENDPOINT S3 (Gateway, gratuit)
  # Décision d'architecture déjà documentée : garder le trafic hors internet
  # public. ECS tire les layers d'image depuis S3 (backend d'ECR) : sans cet
  # endpoint, ce trafic passerait par le NAT Gateway (coût au Go inutile).
  # Les endpoints Interface (ECR API, Secrets Manager, CloudWatch Logs) ne
  # sont volontairement PAS créés ici : ils seront ajoutés dans la stack
  # ECS (ticket futur), car ils nécessitent un security group dédié que le
  # VPC seul ne peut pas raisonnablement pré-définir.
  # ------------------------------------------------------------------------
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref Vpc
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.s3'
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable1
        - !Ref PrivateRouteTable2

  # ------------------------------------------------------------------------
  # VPC FLOW LOGS (optionnel — condition EnableFlowLogs)
  # ------------------------------------------------------------------------
  FlowLogsRole:
    Type: AWS::IAM::Role
    Condition: CreateFlowLogs
    Properties:
      RoleName: !Sub '${ProjectName}-${Environment}-flowlogs-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogsToCloudWatch
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: '*'

  FlowLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: CreateFlowLogs
    Properties:
      LogGroupName: !Sub '/aws/vpc/${ProjectName}-${Environment}-flowlogs'
      RetentionInDays: !Ref FlowLogsRetentionDays

  VpcFlowLog:
    Type: AWS::EC2::FlowLog
    Condition: CreateFlowLogs
    Properties:
      ResourceType: VPC
      ResourceId: !Ref Vpc
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref FlowLogsLogGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogsRole.Arn

# ==============================================================================
# OUTPUTS
# Exportés avec la même convention de nommage que ecr.yaml / codebuild.yaml,
# pour que les futures stacks (ECS, ALB, CodePipeline) puissent les importer
# via Fn::ImportValue sans dupliquer de valeurs en dur.
# ==============================================================================
Outputs:

  VpcId:
    Description: ID du VPC
    Value: !Ref Vpc
    Export:
      Name: !Sub '${ProjectName}-${Environment}-vpc-id'

  VpcCidr:
    Description: Bloc CIDR du VPC
    Value: !Ref VpcCidr
    Export:
      Name: !Sub '${ProjectName}-${Environment}-vpc-cidr'

  PublicSubnet1Id:
    Description: ID du subnet public AZ1 (pour l'ALB)
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub '${ProjectName}-${Environment}-public-subnet-1-id'

  PublicSubnet2Id:
    Description: ID du subnet public AZ2 (pour l'ALB)
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub '${ProjectName}-${Environment}-public-subnet-2-id'

  PublicSubnetIds:
    Description: Liste des IDs de subnets publics (format prêt pour ALB Subnets)
    Value: !Join [',', [!Ref PublicSubnet1, !Ref PublicSubnet2]]
    Export:
      Name: !Sub '${ProjectName}-${Environment}-public-subnet-ids'

  PrivateSubnet1Id:
    Description: ID du subnet privé AZ1 (pour les tâches ECS Fargate)
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub '${ProjectName}-${Environment}-private-subnet-1-id'

  PrivateSubnet2Id:
    Description: ID du subnet privé AZ2 (pour les tâches ECS Fargate)
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub '${ProjectName}-${Environment}-private-subnet-2-id'

  PrivateSubnetIds:
    Description: Liste des IDs de subnets privés (format prêt pour ECS NetworkConfiguration)
    Value: !Join [',', [!Ref PrivateSubnet1, !Ref PrivateSubnet2]]
    Export:
      Name: !Sub '${ProjectName}-${Environment}-private-subnet-ids'

  PublicRouteTableId:
    Description: ID de la table de routage publique
    Value: !Ref PublicRouteTable
    Export:
      Name: !Sub '${ProjectName}-${Environment}-public-rt-id'

  PrivateRouteTable1Id:
    Description: ID de la table de routage privée AZ1
    Value: !Ref PrivateRouteTable1
    Export:
      Name: !Sub '${ProjectName}-${Environment}-private-rt-1-id'

  PrivateRouteTable2Id:
    Description: ID de la table de routage privée AZ2
    Value: !Ref PrivateRouteTable2
    Export:
      Name: !Sub '${ProjectName}-${Environment}-private-rt-2-id'

  NatGatewayStrategy:
    Description: Stratégie NAT utilisée par cette stack (single ou ha)
    Value: !Ref NatGatewayStrategy