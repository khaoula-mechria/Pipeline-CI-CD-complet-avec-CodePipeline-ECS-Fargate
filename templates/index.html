<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .done { text-decoration: line-through; color: #888; }
    </style>
</head>
<body>
<div class="container py-5" style="max-width: 700px;">
    <h1 class="mb-4 fw-bold">📋 Task Manager</h1>

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form method="POST" action="{{ url_for('add_task') }}">
                <div class="mb-2">
                    <input type="text" name="title" class="form-control" placeholder="Titre de la tâche" required>
                </div>
                <div class="mb-2">
                    <input type="text" name="description" class="form-control" placeholder="Description (optionnel)">
                </div>
                <div class="row g-2 align-items-center">
                    <div class="col">
                        <select name="priority" class="form-select">
                            <option value="Faible">Faible</option>
                            <option value="Moyenne" selected>Moyenne</option>
                            <option value="Haute">Haute</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary">Ajouter</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    {% if tasks %}
    <ul class="list-group shadow-sm">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-start">
            <div class="{{ 'done' if task.status == 'Terminee' else '' }}">
                <div class="fw-semibold">{{ task.title }}</div>
                {% if task.description %}<div class="text-muted small">{{ task.description }}</div>{% endif %}
                <span class="badge bg-{{ 'success' if task.priority == 'Faible' else ('warning' if task.priority == 'Moyenne' else 'danger') }}">{{ task.priority }}</span>
            </div>
            <div class="d-flex gap-1">
                <form method="POST" action="{{ url_for('toggle_task', task_id=task.id) }}">
                    <button type="submit" class="btn btn-sm btn-outline-success" title="Terminer / Réactiver">
                        <i class="bi">✓</i>
                    </button>
                </form>
                <form method="POST" action="{{ url_for('delete_task', task_id=task.id) }}" onsubmit="return confirm('Supprimer cette tâche ?');">
                    <button type="submit" class="btn btn-sm btn-outline-danger">✕</button>
                </form>
            </div>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="text-muted text-center">Aucune tâche pour le moment. Ajoutez-en une !</p>
    {% endif %}
</div>
</body>
</html>
